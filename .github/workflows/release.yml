name: Create a new GitHub Release
run-name: Bump to version ${{ github.env.NEW_VERSION }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "The type of version bump"
        required: true
        type: choice
        options:
          - "major"
          - "minor"
          - "patch"

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: "pip"
          cache-dependency-path: requirements/dev.txt

      - name: Install pandoc
        run: sudo apt install -y pandoc

      - name: Install requirements
        run: pip install scriv bump-my-version

      - name: Set up git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Get current and new version
        run: |
          echo "NEW_VERSION=$(bump-my-version show --increment $TAG new_version)" >> $GITHUB_ENV
          echo "CURRENT_VERSION=$(bump-my-version show current_version)" >> $GITHUB_ENV

      - name: Bump version
        run: bump-my-version bump $TAG

      - name: Collect changelog
        run: make changelog

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: ${{ github.ref }}
          commit_message: "chore: bump version ${{ github.env.CURRENT_VERSION }} → ${{ github.env.NEW_VERSION }}"

      - name: Create tag
        run: git tag "v$NEW_VERSION"

      - name: Create or update GitHub release
        run: scriv github-release --repo=bryanttv/openedx-filters
        env:
          GITHUB_TOKEN: ${{ github.token }}
